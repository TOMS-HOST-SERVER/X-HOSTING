<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR TRADING GPT-v4 PRO AI</title>
    <style>
        :root {
            --chat-bg: #212121;
            --ai-accent: #10a37f;
            --user-accent: #343541;
            --text-color: #ececf1;
            --glow: #00ff88;
        }
        body {
            background-color: #343541;
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-nav {
            background: #202123;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #4d4d4f;
            color: var(--ai-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .analysis-panel {
            background: #2b2c35;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
            border-bottom: 1px solid #444;
        }
        .num-chip {
            background: #1a1a1a;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
        }
        .num-chip.hit {
            border-color: var(--ai-accent);
            color: var(--ai-accent);
            box-shadow: 0 0 5px var(--ai-accent);
        }
        .market-bar {
            background: #444654;
            padding: 10px;
            font-size: 12px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #222;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
        }
        .ai-message {
            background: var(--chat-bg);
            align-self: flex-start;
            border-left: 4px solid var(--ai-accent);
        }
        .user-message {
            background: var(--user-accent);
            align-self: flex-end;
            border: 1px solid #565869;
        }
        .result-card {
            background: #000;
            border: 1px solid var(--ai-accent);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
        }
        .input-area {
            background: #343541;
            padding: 15px;
            border-top: 1px solid #4d4d4f;
        }
        .input-box {
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .input-box input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            outline: none;
        }
        .send-btn {
            background: var(--ai-accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .reg-link { color: var(--ai-accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="top-nav">AR TRADING AI GPT-v4 PRO</div>

<div class="analysis-panel" id="number-grid"></div>

<div class="market-bar">
    <span>PERIOD: <b id="period" style="color: #ffcc00;">LOADING...</b></span>
    <span>TIMER: <b id="timer" style="color: var(--ai-accent);">00:30</b></span>
</div>

<div class="chat-container" id="chatbox">
    <div class="message ai-message">
        হ্যালো! আমি <b>AR Trading AI GPT</b>। <br>
        সঠিক পিরিয়ড সিঙ্ক করা হয়েছে। পরবর্তী সিগন্যালের জন্য <b>"Analyze"</b> লিখুন।
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask AI for signal...">
        <button class="send-btn" onclick="processAI()">Send</button>
    </div>
    <p style="font-size: 10px; text-align: center; color: #8e8ea0; margin-top: 10px;">
        Official Site: <a href="https://hgnice.bet/#/register?invitationCode=325151812259" class="reg-link">Register Now</a>
    </p>
</div>

<script>
    const numGrid = document.getElementById('number-grid');
    for(let i=0; i<=9; i++) {
        numGrid.innerHTML += `<div class="num-chip" id="n-${i}">${i}</div>`;
    }

    function updateMarket() {
        const now = new Date();
        
        const year = now.getUTCFullYear();
        const month = String(now.getUTCMonth() + 1).padStart(2, '0');
        const day = String(now.getUTCDate()).padStart(2, '0');
        const datePart = `${year}${month}${day}`;

        // ৩০ সেকেন্ড পিরিয়ড লজিক: ১ মিনিটে ২টা পিরিয়ড
        const totalHalfMinutes = (now.getUTCHours() * 120) + (now.getUTCMinutes() * 2) + (now.getUTCSeconds() >= 30 ? 1 : 0);
        const periodId = datePart + "030" + String(totalHalfMinutes + 1).padStart(4, '0');
        
        document.getElementById('period').innerText = periodId;

        // টাইমার ৩০ সেকেন্ড থেকে উল্টো কাউন্ট
        const sec = now.getUTCSeconds();
        const remaining = sec >= 30 ? 60 - sec : 30 - sec;
        document.getElementById('timer').innerText = "00:" + String(remaining).padStart(2, '0');

        if(remaining % 5 === 0) {
            document.querySelectorAll('.num-chip').forEach(c => c.classList.remove('hit'));
            document.getElementById('n-' + Math.floor(Math.random()*10)).classList.add('hit');
        }
    }
    setInterval(updateMarket, 1000);

    const chatbox = document.getElementById('chatbox');

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = "message " + (type === 'user' ? 'user-message' : 'ai-message');
        div.innerHTML = text;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function processAI() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if (val === "") return;

        appendMessage(val, 'user');
        input.value = "";

        // AI এনালাইসিস টাইম ৩০ সেকেন্ডের উপযোগী করে দ্রুত করা হয়েছে (১ সেকেন্ড ডিলে)
        setTimeout(() => {
            appendMessage("<i>AI এনালাইসিস শুরু করছে... ৩০ সেকেন্ড পিরিয়ড চেক করা হচ্ছে...</i>", 'ai-message');
            
            setTimeout(() => {
                const results = ["BIG 🔴", "SMALL 🟢", "RED 🔴", "GREEN 🟢"];
                const res = results[Math.floor(Math.random() * results.length)];
                const luckyNum = Math.floor(Math.random() * 10);
                const acc = (Math.random() * (99 - 96) + 96).toFixed(2); // একুরেসি একটু বাড়ানো হয়েছে
                
                const response = `
                    <div class="result-card">
                        <span style="color:var(--ai-accent); font-size:11px;">GPT-v4 30S MODE</span><br>
                        <b style="font-size:22px; color:white;">${res}</b><br>
                        <span style="color:#888;">LUCKY NUMBER: ${luckyNum}</span><br>
                        <hr style="border:0.5px solid #333; margin:10px 0;">
                        <span style="font-size:12px; color: #ffcc00;">CONFIDENCE: ${acc}%</span>
                    </div>
                `;
                chatbox.lastChild.innerHTML = response;
                document.querySelectorAll('.num-chip').forEach(c => c.classList.remove('hit'));
                document.getElementById('n-' + luckyNum).classList.add('hit');
            }, 1200); // দ্রুত রেজাল্ট জেনারেশন
        }, 300);
    }
</script>

</body>
</html>
