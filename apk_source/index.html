<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SAIF LEADER � VIP</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Rajdhani', sans-serif; background: #000; overflow: hidden; }

        #backgroundIframe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1;
        }

        #hiddenLogoContainer {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; z-index: 999999; cursor: pointer;
            transition: all 0.3s ease; filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.5));
        }

        #hiddenLogo {
            width: 100%; height: 100%; border-radius: 50%; background: #0a0a1a; border: 2px solid #00ffff;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #logoImage { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* Prediction Box - Smaller & Cleaner */
        #predictionBox {
            position: fixed; top: 100px; left: 50px; width: 180px;
            background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
            backdrop-filter: blur(10px); border-radius: 15px; color: #fff;
            border: 2px solid #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            z-index: 99999; cursor: grab; user-select: none; display: none;
            font-family: 'Orbitron', sans-serif; touch-action: none;
        }

        #predictionBox.active { display: block; animation: boxAppear 0.4s ease-out; }
        @keyframes boxAppear { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Screen Shake Effect */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-screen { animation: shake 0.5s; animation-iteration-count: infinite; }

        .box-header { padding: 10px; border-bottom: 1px solid rgba(0, 255, 255, 0.3); text-align: center; }
        #vipTitle { font-size: 14px; font-weight: 900; color: #00ffff; text-shadow: 0 0 5px #00ffff; }

        .box-content { padding: 12px; text-align: center; }
        
        #loginForm input {
            width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #00ffff;
            margin-bottom: 10px; background: rgba(0, 0, 0, 0.5); color: #00ffff;
            font-size: 12px; text-align: center; outline: none;
        }

        #loginBtn {
            width: 100%; padding: 8px; border-radius: 8px; border: none;
            background: linear-gradient(45deg, #00ffff, #0080ff); color: #000;
            font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.3s;
        }

        #predictionUI { display: none; }
        #livePrediction { font-size: 22px; font-weight: 900; color: #ffff00; margin: 10px 0; text-shadow: 0 0 10px #ffff00; }
        #timer { font-size: 14px; color: #00ffff; font-weight: bold; }

        /* Cyber Alert Modal */
        #cyberAlert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000000;
            display: none; align-items: center; justify-content: center;
        }
        #cyberAlert.active { display: flex; }
        .alert-content {
            background: #1a0000; border: 2px solid #ff0000; padding: 30px;
            border-radius: 15px; text-align: center; color: #ff0000;
            box-shadow: 0 0 30px #ff0000; max-width: 90%;
        }
        .alert-title { font-size: 24px; font-weight: 900; margin-bottom: 15px; }
        .alert-message { font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <!-- Updated iframe link -->
    <iframe id="backgroundIframe" src="https://tkbet999.xyz/#/register?invitationCode=296998276682"></iframe>

    <div id="cyberAlert">
        <div class="alert-content">
            <div class="alert-title"><i class="fas fa-exclamation-triangle"></i> CYBER ALERT</div>
            <div class="alert-message">WRONG PASSWORD DETECTED!<br>SYSTEM SECURED. REDIRECTING...</div>
            <div id="alertCountdown">Redirecting in 3 seconds...</div>
        </div>
    </div>

    <div id="hiddenLogoContainer">
        <div id="hiddenLogo">
            <img id="logoImage" src="https://img.sanishtech.com/u/dee5324b32df6830ab5b37678b150419.jpg">
        </div>
    </div>

    <div id="predictionBox">
        <div class="box-header">
            <!-- Updated Title -->
            <div id="vipTitle">%uD835%uDDDD%uD835%uDDD8%uD835%uDDE5%uD835%uDDE5%uD835%uDDEC %uD835%uDDDF%uD835%uDDD8%uD835%uDDD4%uD835%uDDD7%uD835%uDDD8%uD835%uDDE5</div>
        </div>
        <div class="box-content">
            <div id="loginForm">
                <input id="passwordInput" placeholder="Enter VIP Key" type="password"/>
                <button id="loginBtn">LOGIN</button>
            </div>
            <div id="predictionUI">
                <div id="timer">00:30</div>
                <div id="livePrediction">-</div>
            </div>
        </div>
    </div>

    <script>
        // ===== ONLY STATIC PASSWORD ===== 
        const CORRECT_PASSWORD = "𝐗𝐀™𝐎𝐖𝐍𝐄𝐑 𝐒𝐀𝐈𝐅";   // Fixed password as requested
        
        let boxVisible = false;
        let isAuthenticated = false;

        // Handle login button click
        async function handleLogin() {
            const input = document.getElementById("passwordInput").value;
            
            // Simple static password check
            if (input === CORRECT_PASSWORD) {
                loginSuccess();
            } else {
                triggerCyberAlert();
            }
        }

        function loginSuccess() {
            isAuthenticated = true;
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("predictionUI").style.display = "block";
            startTimer();
        }

        function triggerCyberAlert() {
            document.body.classList.add('shake-screen');
            document.getElementById("cyberAlert").classList.add('active');
            let count = 3;
            const interval = setInterval(() => {
                count--;
                document.getElementById("alertCountdown").innerText = `Redirecting in ${count} seconds...`;
                if (count <= 0) {
                    clearInterval(interval);
                    window.location.href = "http://t.me/error_404_system";
                }
            }, 1000);
        }

        function startTimer() {
            // Update timer every second and generate prediction every 30 seconds
            setInterval(() => {
                const now = new Date();
                const seconds = now.getSeconds();
                let remaining = 30 - (seconds % 30);
                document.getElementById("timer").innerText = `00:${remaining.toString().padStart(2, '0')}`;
                if (seconds % 30 === 0) generatePrediction();
            }, 1000);
            generatePrediction();
        }

        function generatePrediction() {
            const list = ["BIG 5,7", "SMALL 3,0", "SMALL 4,1", "BIG 8,9", "BIG 7,9", "SMALL 0,2", "BIG 5,8", "BIG 6,8", "SMALL 1,4", "SMALL 2,3"];
            document.getElementById("livePrediction").innerText = list[Math.floor(Math.random() * list.length)];
        }

        // Smooth Dragging System (unchanged)
        function makeDraggable(el) {
            let x = 0, y = 0, mouseX = 0, mouseY = 0;
            el.onmousedown = dragStart;
            el.ontouchstart = dragStart;

            function dragStart(e) {
                e = e || window.event;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                mouseX = clientX;
                mouseY = clientY;
                document.onmouseup = dragEnd;
                document.onmousemove = dragMove;
                document.ontouchend = dragEnd;
                document.ontouchmove = dragMove;
            }

            function dragMove(e) {
                e = e || window.event;
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                x = mouseX - clientX;
                y = mouseY - clientY;
                mouseX = clientX;
                mouseY = clientY;
                el.style.top = (el.offsetTop - y) + "px";
                el.style.left = (el.offsetLeft - x) + "px";
            }

            function dragEnd() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        // Initialize everything when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            // Set up login button
            document.getElementById("loginBtn").onclick = handleLogin;
            
            // Toggle prediction box when logo is clicked
            document.getElementById("hiddenLogoContainer").onclick = () => {
                boxVisible = !boxVisible;
                document.getElementById("predictionBox").classList.toggle('active', boxVisible);
            };
            
            // Make both elements draggable
            makeDraggable(document.getElementById("predictionBox"));
            makeDraggable(document.getElementById("hiddenLogoContainer"));
        });
    </script>
</body>
</html>
