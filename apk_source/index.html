        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: radial-gradient(ellipse at 30% 20%, #0b0719, #02010a);
            overflow: hidden;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        :root {
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff2d75;
            --neon-purple: #b517ff;
            --neon-gold: #ffd700;
            --glass-bg: rgba(12, 8, 28, 0.75);
            --glass-border: rgba(0, 242, 254, 0.45);
            --success: #00ffb3;
            --warning: #ffd166;
            --danger: #ff4d6d;
            --shadow-glow: 0 0 25px rgba(0,242,254,0.5);
        }

        h1, h2, h3, .logo-text, .mode-title, .g-name, .nav-item {
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        /* Modern Glassmorphic Elements */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Danger Logo - Enhanced */
        .danger-logo {
            width: 140px;
            height: 140px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            animation: logoGlow 0.6s cubic-bezier(0.2, 1.2, 0.8, 1);
            position: relative;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(24px);
            border: 1.5px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        
        .danger-logo .pred-number {
            font-size: 30px;
            font-weight: 900;
            background: rgba(0,0,0,0.75);
            padding: 8px 20px;
            border-radius: 50px;
            letter-spacing: 4px;
            font-family: 'Orbitron', monospace;
            backdrop-filter: blur(4px);
        }

        @keyframes logoGlow {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; filter: blur(12px); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
        }

        .logo-big { background: linear-gradient(135deg, #ff3366, #ff00c8); box-shadow: 0 0 60px #ff00c8; }
        .logo-small { background: linear-gradient(135deg, #00c9ff, #0088ff); box-shadow: 0 0 60px #00c9ff; }
        .logo-green { background: linear-gradient(135deg, #00f5a0, #00b248); box-shadow: 0 0 60px #00f5a0; }
        .logo-red { background: linear-gradient(135deg, #ff4d6d, #b91c1c); box-shadow: 0 0 60px #ff4d6d; }

        .history-logo {
            width: 56px;
            height: 56px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            flex-direction: column;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--neon-cyan);
            transition: transform 0.2s;
        }

        /* Splash Screen Modern */
        #splash-screen {
            position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, #140f2c, #010005);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.2,0.9,0.4,1.1);
        }
        .splash-logo { width: 130px; height: 130px; border-radius: 42px; object-fit: cover; border: 2px solid var(--neon-cyan); box-shadow: 0 0 80px var(--neon-magenta); animation: splashPulse 1.5s infinite alternate; }
        @keyframes splashPulse { 0% { box-shadow: 0 0 20px var(--neon-cyan); transform: scale(0.98); } 100% { box-shadow: 0 0 90px var(--neon-purple); transform: scale(1.02); } }
        .splash-name { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #00f2fe, #ff2d75, #b517ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 20px; font-family: 'Orbitron', monospace; letter-spacing: 3px; }

        /* Floating Core */
        #floating-logo { position: fixed; width: 72px; height: 72px; left: 18px; top: 115px; z-index: 2500; display: block; cursor: pointer; filter: drop-shadow(0 0 15px cyan); transition: 0.25s; }
        #floating-logo img { width: 100%; height: 100%; border-radius: 28px; border: 2px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-magenta); transition: 0.2s; }
        #floating-logo:active { transform: scale(0.92); }

        /* Notification */
        #notif-box {
            position: fixed; top: -80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px;
            background: rgba(8, 8, 28, 0.97); backdrop-filter: blur(32px);
            border: 1px solid var(--neon-cyan); border-radius: 80px; padding: 14px 28px;
            display: flex; align-items: center; justify-content: center; gap: 14px; z-index: 3000;
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 0 70px rgba(0,242,254,0.5);
        }
        #notif-box.show { top: 22px; }
        .n-text { font-weight: 700; font-size: 13px; letter-spacing: 0.8px; }

        /* Game Selection Modern */
        .overlay-screen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #130e2a 0%, #020108 100%);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease; opacity: 0; visibility: hidden;
        }
        .overlay-screen.active-screen { opacity: 1; visibility: visible; }
        .selection-container { width: 92%; max-width: 540px; text-align: center; padding: 20px 0 60px; margin: auto; }

        /* Game Cards - Glass with Image */
        .game-card {
            background: var(--glass-bg); backdrop-filter: blur(24px);
            padding: 18px 22px; border-radius: 44px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2); box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .game-card:hover { transform: translateY(-4px); border-color: var(--neon-magenta); background: rgba(30, 20, 55, 0.85); box-shadow: 0 0 30px rgba(255,45,117,0.4); }
        .game-card:active { transform: scale(0.97); }
        .game-card .g-name { font-weight: 800; font-size: 19px; background: linear-gradient(135deg, #fff, var(--neon-cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .game-card .g-tag { font-size: 10px; color: var(--neon-magenta); font-weight: 700; letter-spacing: 0.5px; margin-top: 4px; }

        .mode-card {
            background: var(--glass-bg); backdrop-filter: blur(24px);
            border-radius: 60px; padding: 14px 24px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; cursor: pointer; height: 110px;
            transition: all 0.3s;
        }
        .mode-card:active { transform: scale(0.97); background: rgba(0,242,254,0.12); border-color: var(--neon-cyan); }
        .mode-icon { width: 74px; height: 74px; background: rgba(0,0,0,0.55); border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 34px; color: var(--neon-cyan); backdrop-filter: blur(12px); }
        .mode-title { font-weight: 800; font-size: 20px; background: linear-gradient(135deg, #fff, #ff66c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .mode-desc { font-size: 11px; color: var(--neon-purple); font-weight: 700; }

        .back-btn { margin-top: 45px; font-weight: 700; color: var(--neon-cyan); cursor: pointer; padding: 16px; font-family: 'Orbitron', monospace; border: 1px solid rgba(0,242,254,0.6); border-radius: 80px; width: 75%; margin-left: auto; margin-right: auto; backdrop-filter: blur(12px); transition: 0.25s; }
        .back-btn:active { background: rgba(0,242,254,0.2); transform: scale(0.96); }

        /* Header */
        header {
            position: fixed; top: 0; width: 100%; height: 68px; background: rgba(3, 3, 18, 0.9); backdrop-filter: blur(24px);
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100;
            border-bottom: 1px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .logo-text { font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #00f2fe, #ff2d75, #b517ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        #balance { background: rgba(0,0,0,0.65); backdrop-filter: blur(16px); padding: 6px 20px; border-radius: 60px; border: 1px solid var(--neon-gold); display: flex; align-items: center; gap: 8px; font-weight: 800; color: #ffe484; }

        /* Injector Panel Neon Premium */
        #injector {
            position: fixed; top: 130px; left: 50%; width: 350px; background: rgba(6, 4, 22, 0.98);
            backdrop-filter: blur(40px); border-radius: 56px; z-index: 2000; padding: 28px; text-align: center;
            border: 1.5px solid var(--neon-purple); transform: translate(-50%, -20px) scale(0.5); opacity: 0;
            pointer-events: none; transition: 0.4s; box-shadow: 0 0 120px rgba(181,23,255,0.6);
        }
        #injector.active { transform: translate(-50%, 0) scale(1); opacity: 1; pointer-events: auto; }
        .pred-display { background: rgba(0,0,0,0.65); border-radius: 44px; padding: 20px; margin: 20px 0; min-height: 170px; display: flex; align-items: center; justify-content: center; }
        .scanning-line { position: absolute; width: 88%; height: 4px; background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-magenta), transparent); top: 0; left: 6%; opacity: 0; border-radius: 10px; }
        .scanning-active { animation: neonScan 1.8s infinite ease-in-out; opacity: 1; }
        @keyframes neonScan { 0% { top: 0; opacity: 0.9; } 100% { top: 96%; opacity: 0.2; } }

        /* Side Panels Neo */
        .side-panel {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 72vh; background: rgba(4, 2, 18, 0.96);
            backdrop-filter: blur(36px); z-index: 500; padding: 32px 22px; border-top-left-radius: 56px;
            border-top-right-radius: 56px; transform: translateY(110%); transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border-top: 2px solid var(--neon-cyan); overflow-y: auto;
        }
        .side-panel.active { transform: translateY(0); }
        
        .history-card { background: rgba(25, 18, 48, 0.8); backdrop-filter: blur(18px); border-radius: 36px; padding: 16px 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,242,254,0.3); transition: 0.2s; }
        .stats-circle { width: 92px; height: 92px; border-radius: 36px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border: 2px solid var(--neon-cyan); box-shadow: 0 0 35px rgba(0,242,254,0.5); font-family: 'Orbitron', monospace; }
        
        /* Nav Bar Cyberpunk */
        .nav-bar {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 320px;
            height: 72px; background: rgba(6, 4, 22, 0.96); backdrop-filter: blur(28px); border-radius: 60px; display: flex;
            align-items: center; justify-content: space-evenly; z-index: 700; border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 45px rgba(0,242,254,0.4);
        }
        .nav-item { text-align: center; font-weight: 700; font-size: 11px; cursor: pointer; flex: 1; transition: 0.2s; color: #f0f0f0; }
        .nav-item i { font-size: 28px; display: block; color: var(--neon-cyan); margin-bottom: 6px; text-shadow: 0 0 8px cyan; }
        .nav-item:active { transform: scale(0.92); color: var(--neon-magenta); }

        iframe { position: fixed; top: 68px; left: 0; width: 100%; height: calc(100% - 68px); border: none; background: #05030f; z-index: 10; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a1a; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
        
        .main-btn {
            width: 88%; margin: 12px auto; padding: 15px; background: linear-gradient(95deg, #00f2fe, #b517ff);
            border-radius: 60px; font-weight: 800; font-size: 16px; cursor: pointer; border: none; color: white;
            display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 0 40px rgba(0,242,254,0.7);
            transition: 0.2s; font-family: 'Orbitron', monospace;
        }
        .main-btn:active { transform: scale(0.96); }
        
        @keyframes pulseGlow { 0% { border-color: rgba(0,242,254,0.4); } 100% { border-color: rgba(255,45,117,0.8); } }
    </style>
</head>
